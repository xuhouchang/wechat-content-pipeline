# ── Filtering Rules ──
# 定义内容相关度过滤的各个分类。每个分类指定关键词和权重。
# 此配置会合并到 filter_items.py 的系统 prompt 中（通过模板变量注入）。
filtering:
  rules:
    - id: "enterprise-ai-adoption"
      label: "AI在企业中的实际落地"
      weight: 80
      keywords: ["deployment", "adoption", "implementation", "ROI", "workflow"]

    - id: "org-talent"
      label: "组织/人才/绩效"
      weight: 80
      keywords: ["workforce", "reskilling", "organization", "culture", "leadership"]

    - id: "ai-governance"
      label: "AI治理与风险合规"
      weight: 70
      keywords: ["risk", "compliance", "safety", "regulation", "governance"]

    - id: "technical-architecture"
      label: "AI系统建设/架构"
      weight: 60
      keywords: ["infrastructure", "architecture", "LLM", "training", "deployment"]

    - id: "case-study"
      label: "企业AI落地案例"
      weight: 90
      keywords: ["case study", "real-world", "production", "deployment"]

    - id: "surprising-research"
      label: "反常识AI研究"
      weight: 40
      keywords: ["unexpected", "surprising", "counterintuitive", "discovery"]
