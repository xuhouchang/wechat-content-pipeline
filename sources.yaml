# ═══════════════════════════════════════════════
# 内容采集器 — 渠道配置
# ═══════════════════════════════════════════════
# 所有采集脚本从本文件读取源列表，修改/增删源不改代码

# ── 内容获取方式配置 ──
# 所有 fetch 调用按以下优先级尝试:
#   1. direct — 直接 HTTP 请求提取正文（默认）
#      - 请求头带 Accept: text/markdown → Cloudflare 开启了 Markdown for Agents
#        的站点会自动返回纯 Markdown（token 减少 60-80%）。不需要任何 API Key。
#      - 如果服务器不支持 text/markdown，正常返回 HTML。
#   2. jina — direct 失败时的兜底。Jina Reader API 能绕过多数反爬。
#
# 单个源可以 override:
#   fetch_mode: jina (强制用 Jina，不走 direct)
reader:
  direct: {}
  jina:
    enabled: true
    api_key: "your_jina_api_key_here"
    base_url: "https://r.jina.ai"

